# Estados de HU (ciclo de vida)
# [ ] Pendiente - HU creada, sin analizar
# [R] Refinada - Analizada con criterios y estimación (por refinar_hu)
# [A] Aprobada - Validada arquitectónicamente (por validar_hu)
# [P] Planificada - Tiene plan de implementación (por planificar_hu)
# [E] En Ejecución - ArchDev ejecutando el plan (por ejecutar_plan)
# [X] Completada - Implementación terminada (por ejecutar_plan)
# [B] Bloqueada - Dependencias no resueltas (por cualquier herramienta)

