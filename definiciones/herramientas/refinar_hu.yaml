# ============================================
# DEFINICIÓN: refinar_hu
# ============================================
id: refinar_hu
nombre: "Refinar Historia de Usuario"
version: "2.0"
estado: activo

descripcion_corta: >
  Analizar una Historia de Usuario (HU) y producir preguntas de clarificación,
  criterios de aceptación mejorados, desglose técnico vertical, estrategia
  y estimación justificadas para optimizar la planificación.

# Roles que pueden usar esta herramienta
roles_autorizados:
  - REFINADOR
  - ARCHDEV
  - DEVOPS

# Artefactos que genera
artefactos_generados:
  - nombre: "[ID-HU]_refinamiento_[concepto].md"
    ubicacion: "{{hu_refinamiento_location}}"
    requiere_confirmacion: false

# Herramientas que invoca
invoca:
  - tomar_contexto

# Actualiza
actualiza:
  - backlog_desarrollo.md
  - session_state.json

# Referencia al archivo completo
archivo_completo: "herramientas/refinar_hu.md"
