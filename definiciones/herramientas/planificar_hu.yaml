# ============================================
# DEFINICIÓN: planificar_hu
# ============================================
id: planificar_hu
nombre: "Planificar Historia de Usuario"
version: "2.0"
estado: activo

descripcion_corta: >
  Crear planes de implementación alineados con la arquitectura del sistema.
  Generar tareas técnicas, estimaciones y secuencia de desarrollo.

# Roles que pueden usar esta herramienta
roles_autorizados:
  - ONAD

# Herramientas relacionadas
relacionada_con:
  - validar_hu
  - refinar_hu
  - ejecutar_plan

# Artefactos que genera
artefactos_generados:
  - nombre: "[ID-HU]_plan_implementacion.md"
    ubicacion: "{{planes_location}}"

# Referencia al archivo completo
archivo_completo: "herramientas/planificar_hu.md"
