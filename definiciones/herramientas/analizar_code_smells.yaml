# ============================================
# DEFINICIÓN: analizar_code_smells
# ============================================
id: analizar_code_smells
nombre: "Analizar Code Smells"
version: "2.0"
estado: activo

descripcion_corta: >
  Detectar problemas de diseño y calidad en el código: God Objects, Feature Envy,
  Long Methods, Duplicación, etc. Genera reporte priorizado de mejoras.

# Roles que pueden usar esta herramienta
roles_autorizados:
  - ARCHDEV

# Herramientas que invoca
invoca:
  - tomar_contexto

# Herramientas relacionadas
relacionada_con:
  - solucionar_smells
  - refactorizar

# Artefactos que genera
artefactos_generados:
  - nombre: "code_smells_[fecha].md"
    ubicacion: "{{code_smells_location}}"

# Referencia al archivo completo
archivo_completo: "herramientas/analizar_code_smells.md"
