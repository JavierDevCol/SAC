# ============================================
# DEFINICIÓN: tomar_contexto
# ============================================
id: tomar_contexto
nombre: "Tomar Contexto"
version: "2.1"
estado: activo

descripcion_corta: >
  Análisis profundo y automatizado de un proyecto de software para extraer
  información técnica, arquitectónica y contextual. Genera contexto_proyecto.md
  y reglas_arquitectonicas.md como base de conocimiento reutilizable.

# Roles que pueden usar esta herramienta
roles_autorizados:
  - ARCHDEV
  - ONAD
  - DEVOPS
  - REFINADOR
  - ARTESANO

# Artefactos que genera
artefactos_generados:
  - nombre: "contexto_proyecto.md"
    ubicacion: "{{contexto_proyecto_location}}"
    requiere_confirmacion: false
  - nombre: "reglas_arquitectonicas.md"
    ubicacion: "{{reglas_arquitectonicas_location}}"
    requiere_confirmacion: true

# Herramientas que la invocan
invocada_por:
  - diagnosticar_devops
  - define_arquitectura
  - analizar_code_smells
  - refinar_hu
  - solucionar_smells
  - verifica_pruebas
  - crear_pruebas
  - generar_commit

# Referencia al archivo completo
archivo_completo: "herramientas/tomar_contexto.md"
