# Herramienta: Ejecutar Plan de Implementación
nombre: "Ejecutar Plan de Implementación"
comando: ">ejecutar_plan"
alias: [">ejecutar", ">implementar"]
version: "5.0"

mandatory:
  - instruccion: "Ejecutar tareas del plan en ORDEN ESTRICTO"
  - instruccion: "DETENERSE INMEDIATAMENTE ante cualquier error"
  - instruccion: "Solicitar CONFIRMACIÓN antes de comandos Git"
  - instruccion: "NO improvisar ni saltar tareas del plan"
  - instruccion: "ACTUALIZAR plan EN TIEMPO REAL: [ ]  [X], estados de tareas"
  - instruccion: "Estados de tareas: [PENDIENTE]  [EN_PROGRESO]  [EJECUTADA]"
  - instruccion: "En HUs particionadas, respetar dependencias entre tasks funcionales antes de ejecutar"
  - instruccion: "Validar campo Modo del plan (Plano|Particionada) para determinar estrategia de ejecución"

reglas_arquitectonicas_requeridas:
  descripcion: "Si hay reglas arquitectónicas cargadas, aplicar:"
  secciones:
    - seccion: "nomenclatura.*"
      aplicar: "Nombrar clases, métodos, variables según convenciones definidas"
    - seccion: "arquitectura.estructura"
      aplicar: "Crear archivos en carpetas según estructura definida (domain/, application/, infrastructure/)"
    - seccion: "patrones.obligatorios"
      aplicar: "Usar patrones requeridos (Repository, Factory, Builder, etc.)"
    - seccion: "patrones.prohibidos"
      aplicar: "NUNCA usar patrones prohibidos (Singleton, Service Locator, etc.)"
    - seccion: "principios.inmutabilidad"
      aplicar: "Usar final/readonly/const según política"
    - seccion: "principios.null_policy"
      aplicar: "Manejar nulls según política (Optional, Null Object, etc.)"
    - seccion: "calidad.max_*"
      aplicar: "Respetar límites de líneas por método/clase/parámetros"
  si_no_existe: "Usar mejores prácticas estándar del stack detectado"

condiciones_entrada:
  - condicion: "HU en estado [P] Planificada con plan generado"
    si_no_cumple: "Ejecutar >planificar_hu primero"

parametros:
  requeridos:
    - nombre: id_hu
      tipo: string
      descripcion: "Identificador de la HU a implementar"
  opcionales:
    - nombre: proyecto
      tipo: string
      descripcion: "Proyecto específico (auto-detectado desde campo Proyecto de la HU)"
      defecto: null
    - nombre: modo_ejecucion
      tipo: string
      valores: [completo, fase_por_fase, tarea_por_tarea, task_por_task, task_especifica]
      defecto: fase_por_fase
      descripcion: |
        - completo: ejecuta todo sin pausas (HU plana: fases; HU particionada: T1→T2→T3)
        - fase_por_fase: pausa entre fases (solo HU plana; en particionada degrada a task_por_task)
        - tarea_por_tarea: pausa en cada tarea técnica (aplica en ambos modos)
        - task_por_task: pausa entre tasks funcionales (solo HU particionada; en plana degrada a fase_por_fase)
        - task_especifica: ejecuta solo la task indicada en task_id (solo HU particionada)
    - nombre: task_id
      tipo: string
      descripcion: "ID de task funcional a ejecutar (ej: HU-012-TASK-1). Solo aplica con modo_ejecucion=task_especifica. Si no se especifica, lista tasks disponibles."
      defecto: null
    - nombre: auto_commit
      tipo: boolean
      defecto: false

proceso:
  - paso: "Inicialización de Parámetros"
    obligatorio: true
    acciones:
      - "Establecer valores por defecto para parámetros opcionales no especificados: modo_ejecucion='fase_por_fase', auto_commit=false, task_id=null"
      - "Mostrar resumen compacto de configuración activa:"
      - "  ⚙️ Configuración: modo_ejecucion=[valor] | auto_commit=[valor] | task_id=[valor]"
      - "  Personaliza con: >ejecutar_plan [ID-HU] --modo_ejecucion task_especifica --task_id HU-XXX-TASK-1"
    nota: "Garantiza evaluación correcta de condiciones y visibilidad de la configuración activa"
    validaciones_combinacion:
      - si: "modo_ejecucion=completo AND auto_commit=true"
        accion: "⛔ Combinación prohibida. Usar fase_por_fase con auto_commit, o completo sin auto_commit"
        razon: "Ejecutar todo sin pausas Y con commit automático elimina toda supervisión humana"
      - si: "task_id != null AND modo_ejecucion != task_especifica"
        accion: "⚠️ Parámetro task_id ignorado. Solo aplica con --modo_ejecucion task_especifica"
      - si: "modo_ejecucion=task_especifica AND task_id = null"
        accion: "Listar tasks disponibles con estado de ejecutabilidad (ver paso Resolver Modo)"

  - paso: "Cargar Plan de Implementación"
    obligatorio: true
    acciones:
      - "Buscar plan en {{artifacts.planes_folder}}/[ID-HU]_plan_implementacion.md"
      - "Verificar estructura según {{plantillas.plan_implementacion}}"
      - "Verificar estado [P] Planificada en {{archivos.backlog}}"
      - "Extraer campo '- **Proyecto:**' de la HU"
      - "SI Proyecto = 'compartida':"
      - "  1. Leer sección '**Proyectos afectados:**' de la HU (lista de proyectos)"
      - "  2. Ejecutar tareas en el directorio de cada proyecto según corresponda"
      - "SI Multi-Proyecto → Establecer directorio base del proyecto como CWD"
      - "Cambiar estado HU a [E] En Ejecución"
      - "Actualizar Metadata del plan: Estado  EN_PROGRESO"
    si_error:
      no_encontrado: " Plan no encontrado. Ejecutar >planificar_hu primero"
      estado_invalido: " HU debe estar en estado [P] Planificada"

  - paso: "Resolver Modo de Ejecución"
    obligatorio: true
    acciones:
      - "Extraer campo 'Modo' de Metadata del plan: [Plano | Particionada]"
      - "SI Modo = 'Plano' (HU sin tasks):"
      - "  - modo_ejecucion IN [completo, fase_por_fase, tarea_por_tarea] → ✅ Comportamiento estándar sin cambios"
      - "  - modo_ejecucion = task_por_task → ⚠️ Degradar a fase_por_fase con aviso:"
      - "    'ℹ️ HU-XXX no está particionada en tasks. Ejecutando en modo fase_por_fase.'"
      - "  - modo_ejecucion = task_especifica → ⛔ Error:"
      - "    '⛔ HU-XXX no tiene tasks funcionales. Usa --modo_ejecucion completo|fase_por_fase|tarea_por_tarea.'"
      - "SI Modo = 'Particionada' (HU con tasks):"
      - "  - modo_ejecucion = completo → ✅ Ejecutar tasks secuencialmente (TASK-1→TASK-2→TASK-3) sin pausas entre tasks"
      - "  - modo_ejecucion = task_por_task → ✅ Ejecutar tasks con pausa de confirmación entre cada task"
      - "  - modo_ejecucion = tarea_por_tarea → ✅ Pausa en cada tarea técnica (cross-task, granularidad máxima)"
      - "  - modo_ejecucion = fase_por_fase → ⚠️ Degradar a task_por_task con aviso:"
      - "    'ℹ️ HU-XXX está particionada. Ejecutando en modo task_por_task (pausa entre tasks).'"
      - "  - modo_ejecucion = task_especifica:"
      - "    SI task_id proporcionado:"
      - "      1. Verificar que task_id existe en tabla 'Dependencias entre Tasks'"
      - "      2. Verificar que TODAS las tasks de las que depende estén en [EJECUTADA]"
      - "      3. SI dependencias no satisfechas → ⛔ Error:"
      - "         '⛔ No se puede ejecutar [task_id]. Dependencias no satisfechas:'"
      - "         '  → [dep_task] está en [estado]. Ejecutar primero:'"
      - "         '  >ejecutar_plan [ID-HU] --modo_ejecucion task_especifica --task_id [dep_task]'"
      - "      4. SI dependencias satisfechas → Ejecutar SOLO las tareas técnicas de esa task"
      - "    SI task_id NO proporcionado:"
      - "      1. Leer tabla 'Dependencias entre Tasks' del plan"
      - "      2. Evaluar ejecutabilidad de cada task (dependencias satisfechas?)"
      - "      3. Mostrar resumen:"
      - "         '📋 Tasks de HU-XXX:'"
      - "         '| Task | Descripción | Estado | Ejecutable? |'"
      - "         '| HU-XXX-TASK-1 | [desc] | [estado] | ✅/⛔ (requiere TASK-N) |'"
      - "      4. Preguntar: '¿Qué task deseas ejecutar?'"
      - "      5. ESPERAR respuesta del usuario"
    nota: "La degradación con aviso educa al usuario sin bloquearlo. Los modos viejos NUNCA rompen."

  - paso: "Validar Entorno de Ejecución"
    obligatorio: true
    acciones:
      - "Verificar rama Git activa coincide con rama esperada para la HU"
      - "Verificar directorio del proyecto existe y es accesible"
      - "Detectar framework de tests disponible (mvn/npm/pytest/vitest/jest/dotnet test/etc.)"
      - "Verificar dependencias instaladas (node_modules, venv, .m2, etc.)"
      - "Crear punto de restauración: git stash push -m 'backup/[ID-HU]_pre_ejecucion' (si hay cambios sin commit)"
    si_error:
      entorno_invalido: "⛔ Entorno no preparado. Detallar requisitos faltantes antes de continuar"
      sin_framework_tests: "⚠️ No se detectó framework de tests. Confirmar con usuario antes de continuar"

  - paso: "Ejecutar Plan según Modo Resuelto"
    obligatorio: true
    descripcion: "Estrategia de iteración adaptada al Modo del plan (Plano o Particionada)"
    acciones_modo_plano:
      - "(Comportamiento actual sin cambios para HUs sin tasks)"
      - "Para cada fase del plan:"
      - "  1. Anunciar inicio de fase"
      - "  2. Para cada tarea de la fase:"
      - "     a. EDITAR ARCHIVO del plan: cambiar [PENDIENTE] → [EN_PROGRESO] en la línea de la tarea"
      - "     b. Ejecutar los pasos de la tarea (crear/modificar código)"
      - "     c. Por cada paso completado: EDITAR ARCHIVO del plan cambiando '- [ ]' → '- [X]' en ese paso específico"
      - "     d. Al completar TODOS los pasos de la tarea: EDITAR ARCHIVO del plan cambiando [EN_PROGRESO] → [EJECUTADA]"
      - "     e. EDITAR ARCHIVO del plan: agregar fila en tabla 'Historial de Ejecución' con fecha, tarea y resultado"
      - "     f. Actualizar fila de la fase en tabla 'Progreso General': incrementar progreso [X/Y]"
    acciones_modo_particionada:
      - "(Iteración por tasks funcionales → fases internas → tareas técnicas)"
      - "Determinar scope de ejecución según modo resuelto:"
      - "  - completo/task_por_task → tasks_a_ejecutar = TODAS las tasks en orden"
      - "  - task_especifica → tasks_a_ejecutar = [task_id]"
      - "Para cada task funcional en tasks_a_ejecutar:"
      - "  1. Anunciar inicio de task: '═══ Task [ID-HU]-TASK-N: [Título] ═══'"
      - "  2. SI task tiene dependencias → Verificar TODAS en estado [EJECUTADA]"
      - "  3. Para cada fase interna de la task:"
      - "     3.1. Anunciar fase: '### Fase [M]: [Nombre]'"
      - "     3.2. Para cada tarea técnica de la fase:"
      - "        a. EDITAR ARCHIVO del plan: cambiar [PENDIENTE] → [EN_PROGRESO] en la línea de la tarea"
      - "        b. Ejecutar los pasos de la tarea (crear/modificar código)"
      - "        c. Por cada paso completado: EDITAR ARCHIVO del plan cambiando '- [ ]' → '- [X]' en ese paso específico"
      - "        d. Al completar TODOS los pasos: EDITAR ARCHIVO del plan cambiando [EN_PROGRESO] → [EJECUTADA]"
      - "        e. EDITAR ARCHIVO del plan: agregar fila en 'Historial de Ejecución' con fecha, task, tarea y resultado"
      - "        f. Actualizar progreso de la task en tabla 'Progreso General'"
      - "  4. Validar CAs granulares de la task: marcar [ ] → [~] candidato en sección 'Validar CAs de TASK-N'"
      - "     NOTA: [~] = candidato (CAs granulares pasan, pendiente validación de integración)"
      - "  5. EDITAR ARCHIVO del plan: cambiar estado de la task en tabla Progreso General"
      - "  6. SI modo_ejecucion = task_por_task → Pausa de confirmación:"
      - "     '✅ Task [ID-HU]-TASK-N completada. [M] tareas ejecutadas.'"
      - "     '📝 ¿Commit? (>generar_commit) | ▶️ ¿Continuar con TASK-N+1?'"
      - "  7. SI modo_ejecucion = task_especifica → Finalizar tras completar la task"
    critico: "Los pasos c, d, e y f son BLOQUEANTES — NO avanzar a la siguiente tarea sin haber EDITADO el archivo del plan. Si el archivo no refleja el estado actual, la ejecución es inválida."
    reanudacion:
      descripcion: "Si el plan tiene tareas [EJECUTADA], saltar a la primera tarea [PENDIENTE]"
      acciones:
        - "Verificar que los archivos generados por tareas [EJECUTADA] existen en el filesystem"
        - "Si algún archivo falta, marcar la tarea como [PENDIENTE] y re-ejecutarla"
        - "SI Modo = Particionada: identificar la task funcional activa (primera con tareas [PENDIENTE])"
        - "Informar al usuario: 'Reanudando desde tarea TASK-N-EJEC-NN (Task [ID-HU]-TASK-M) — [X] tareas ya completadas'"
    max_reintentos_por_tarea: 2
    si_max_reintentos:
      accion: "DETENER. La tarea TASK-N-EJEC-NN falló [max_reintentos] veces consecutivas"
      sugerencia: "Revisar manualmente y ejecutar >ejecutar_plan [ID-HU] --modo_ejecucion tarea_por_tarea"
    si_error:
      cualquier_error:
        accion: "DETENER inmediatamente"
        actualizar: "EDITAR ARCHIVO del plan: cambiar estado de la tarea a [ERROR], agregar detalle en Historial"

  - paso: "Crear/Modificar Archivos"
    obligatorio: true
    acciones: [Crear archivos nuevos, Modificar existentes, Aplicar convenciones]
    validaciones:
      - condicion: "Código compila correctamente"
        si_no_cumple: "DETENER y reportar error de compilación"

  - paso: "Ejecutar Tests"
    obligatorio: true
    acciones: ["Ejecutar tests: mvn test / npm test / pytest", "Verificar todos pasan"]
    si_error:
      tests_fallidos: " DETENER. Revisar lógica o actualizar tests"

  - paso: "Validar Criterios de Aceptación"
    obligatorio: true
    descripcion: "Delega validación a >validar_ca — los CAs viven en el refinamiento (fuente de verdad), no en el plan."
    acciones:
      - "SI Modo = Plano:"
      - "  Invocar >validar_ca [ID-HU] --scope todos"
      - ""
      - "SI Modo = Particionada Y modo_ejecucion = task_especifica:"
      - "  Invocar >validar_ca [ID-HU] --task_id [task_id] --scope granulares"
      - "  NO validar CAs de integración (padre) hasta que TODAS las tasks estén [EJECUTADA]"
      - ""
      - "SI Modo = Particionada Y modo_ejecucion IN [completo, task_por_task]:"
      - "  1. Por cada task completada: >validar_ca [ID-HU] --task_id [task_id] --scope granulares"
      - "  2. Al final de todas las tasks: >validar_ca [ID-HU] --scope integracion"
    si_error:
      criterio_no_cumplido: " DETENER. Criterio [X] no cumplido. Revisar código antes de continuar."

  - paso: "Confirmación de Commit"
    obligatorio: true
    condicion: "si auto_commit=false"
    acciones: ["Mostrar resumen de cambios", "Preguntar: ¿Proceder con commit?", "Si NO: pausar para revisión", "Si SÍ: sugerir >generar_commit"]

  - paso: "Finalización"
    obligatorio: true
    acciones:
      - "VERIFICAR: Leer archivo del plan y confirmar que TODAS las tareas están en [EJECUTADA] y TODOS los pasos en [X]"
      - "SI hay discrepancias: EDITAR ARCHIVO del plan para corregir estados pendientes ANTES de continuar"
      - "SI Modo = Particionada Y modo_ejecucion = task_especifica:"
      - "  - Verificar si TODAS las tasks del plan están [EJECUTADA]"
      - "  - SI quedan tasks pendientes → NO completar la HU. Mostrar:"
      - "    '✅ Task [task_id] completada. HU aún en progreso — [N] tasks pendientes.'"
      - "    '▶️ Siguiente: >ejecutar_plan [ID-HU] --modo_ejecucion task_especifica --task_id [siguiente_task]'"
      - "  - SI todas las tasks completadas → Continuar con finalización completa"
      - "EDITAR ARCHIVO del plan: cambiar campo Estado en tabla Metadata → 'COMPLETADO'"
      - "Cambiar estado HU a [X] Completada en {{archivos.backlog}}"
      - "SI Multi-Proyecto → Actualizar contadores en sección 'Resumen por Proyecto'"
      - "Agregar entrada final en Historial de Ejecución (incluir columna Proyecto)"

actualizacion_tiempo_real:
  descripcion: "El archivo .md del plan DEBE ser editado (escritura en disco) en cada transición. NO es una anotación mental — es una operación de edición de archivo."
  instrucciones_imperativas:
    - "EDITAR ARCHIVO del plan al iniciar tarea: reemplazar texto '[PENDIENTE]' → '[EN_PROGRESO]' en la línea #### TASK-N-EJEC-NN"
    - "EDITAR ARCHIVO del plan al completar paso: reemplazar texto '- [ ]' → '- [X]' en la línea del paso"
    - "EDITAR ARCHIVO del plan al completar tarea: reemplazar texto '[EN_PROGRESO]' → '[EJECUTADA]' en la línea #### TASK-N-EJEC-NN"
    - "EDITAR ARCHIVO del plan al error: reemplazar estado actual → '[ERROR]' en la línea #### TASK-N-EJEC-NN"
    - "EDITAR ARCHIVO del plan al finalizar: cambiar campo Estado en tabla Metadata a 'COMPLETADO'"
  frecuencia: "Después de CADA tarea, NO al final de todas las fases"
  verificacion: "Si al leer el plan las marcas no coinciden con lo ejecutado, DETENER y corregir antes de continuar"

salida:
  archivos_actualizados:
    - ruta: "{{artifacts.planes_folder}}/[ID-HU]_plan_implementacion.md"
    - ruta: "{{archivos.backlog}}"
    - descripcion: "Archivos de código según plan"
  estado_hu_final_completo: "[C] Completada"
  estado_hu_final_task_parcial: "[E] En Ejecución (tasks pendientes)"
  mensaje_exito_completo: |
     IMPLEMENTACIÓN COMPLETADA: [ID-HU]
    
     Resumen:
    - Tasks: [T/T]  (si particionada)
    - Tareas: [M/M] 
    - Criterios de Aceptación: [Y/Y]  ([~] candidatos confirmados como [X])
    - Tests:  Pasando
  mensaje_exito_task: |
     TASK COMPLETADA: [task_id]
    
     Resumen Task:
    - Tareas: [M/M] 
    - CAs granulares: [Y/Y] 
    - Tests:  Pasando
     Progreso HU: [T_completadas/T_total] tasks
    ▶️ Siguiente: >ejecutar_plan [ID-HU] --modo_ejecucion task_especifica --task_id [siguiente_task]

errores:
  plan_no_encontrado: {msg: " Plan no encontrado", accion: "Ejecutar >planificar_hu primero"}
  estado_incorrecto: {msg: " HU no está en [P] Planificada", accion: "Verificar flujo de estados"}
  compilacion: {msg: " Error de compilación", accion: "Revisar código generado"}
  tests_fallidos: {msg: " Tests fallando", accion: "Revisar lógica o tests"}
  archivo_existente: {msg: " Archivo ya existe", opciones: [Sobrescribir, Fusionar, Omitir]}

siguiente:
  - {comando: ">validar_ca [ID-HU]", desc: "Validar CAs contra código (si no se validaron en ejecución)", chat_agente: "ArchDev Pro"}
  - {comando: ">generar_commit", desc: "Documentar cambios realizados", chat_agente: "Cronista de Cambios"}
