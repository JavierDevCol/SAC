# Herramienta: Validar Historia de Usuario
nombre: "Validar Historia de Usuario"
comando: ">validar_hu"
alias: [">validar", ">aprobar_hu"]
version: "4.2"

mandatory:
  - instruccion: "Verificar alineación con reglas arquitectónicas del proyecto"
  - instruccion: "NO aprobar HU que violen principios arquitectónicos"
  - instruccion: "Documentar razones de rechazo o ajustes requeridos"
  - instruccion: "Verificar dependencias (HUs, APIs, recursos) antes de aprobar"

condiciones_entrada:
  - condicion: "HU en estado [R] Refinada"
    si_no_cumple: "Ejecutar >refinar_hu primero"
  - condicion_alternativa: "HU con Tipo=Bug y severidad Crítica"
    si_cumple: "Permitir aprobación acelerada: validación básica + aprobación directa para bugs críticos"

parametros:
  requeridos:
    - nombre: id_hu
      tipo: string
      descripcion: "Identificador de la HU a validar"
  opcionales:
    - nombre: proyecto
      tipo: string
      descripcion: "Proyecto específico (auto-detectado desde campo Proyecto de la HU)"
      defecto: null
    - {nombre: nivel_validacion, tipo: string, valores: [basico, completo, exhaustivo], defecto: completo}

veredictos:
  aprobada: {estado: "[A] Aprobada", siguiente: ">planificar_hu [ID-HU]"}
  ajustes: {estado: "[R] Refinada + observaciones", siguiente: ">refinar_hu [ID-HU]"}
  bloqueada:
    estado: "[B] Bloqueada"
    siguiente: "Resolver dependencia antes de revalidar"
    tipos_bloqueo:
      - DEPENDENCIA_HU: "Requiere otra HU del backlog completada"
      - DEPENDENCIA_EXTERNA: "Requiere sistema/API externa no disponible"
      - DECISION_PENDIENTE: "Requiere decisión arquitectónica (ADR)"
      - RECURSO_NO_DISPONIBLE: "Falta infraestructura o acceso"
  rechazada: {estado: "[B] Bloqueada", siguiente: "Requiere rediseño significativo"}

proceso:
  - paso: "Inicialización de Parámetros"
    obligatorio: true
    acciones:
      - "Establecer valores por defecto para parámetros opcionales no especificados: nivel_validacion='completo'"
      - "Mostrar resumen compacto de configuración activa:"
      - "  ⚙️ Configuración: nivel_validacion=[valor]"
      - "  Personaliza con: >validar_hu [ID-HU] --nivel_validacion exhaustivo"
    nota: "Garantiza evaluación correcta de condiciones y visibilidad de la configuración activa"

  - paso: "Cargar HU y Contexto"
    obligatorio: true
    acciones: 
      - "Buscar HU en backlog"
      - "Verificar estado [R] Refinada"
      - "Extraer campo '- **Tipo:**' de la HU (SI no existe → asumir Funcional)"
      - "SI Tipo = Bug y severidad Crítica:"
      - "  Aplicar nivel_validacion='basico' automáticamente (validación acelerada)"
      - "  Informar: '⚡ Bug crítico detectado — validación acelerada activa'"
      - "Extraer campo '- **Proyecto:**' de la HU"
      - "SI Proyecto = 'compartida':"
      - "  1. Leer sección '**Proyectos afectados:**' de la HU (lista de proyectos)"
      - "  2. Para cada proyecto listado → Cargar contexto desde {{artifacts.contextos_folder}}/[proyecto]_contexto.md"
      - "  3. Cargar reglas arquitectónicas de cada proyecto"
      - "SI Proyecto = [nombre] → Cargar contexto desde {{artifacts.contextos_folder}}/[proyecto]_contexto.md"
      - "Cargar refinamiento desde {{artifacts.hu_refinamientos}}/[ID-HU]_refinamiento.md"
      - "SI HU tiene campo ADR_Ref → Cargar ADR referenciado desde {{artifacts.adr_folder}}"
    si_error:
      no_encontrada: "HU [id_hu] no encontrada en backlog"
      estado_invalido: "HU debe estar en estado [R] Refinada"
      contexto_no_encontrado: " Contexto del proyecto '[proyecto]' no encontrado"

  - paso: "Detección de Ambigüedades"
    obligatorio: true
    descripcion: "NUNCA asumir. Ante cualquier duda, preguntar al usuario."
    acciones:
      - "Analizar HU y CA buscando: términos vagos, información faltante, contradicciones, casos no cubiertos"
      - "SI se detectan ambigüedades → Listar preguntas claras y específicas"
      - "PAUSAR y esperar respuestas del usuario antes de continuar"
      - "Incorporar respuestas al contexto de validación"
    comportamiento:
      si_hay_dudas: "PREGUNTAR y ESPERAR respuesta"
      si_no_hay_dudas: "Continuar al siguiente paso"
    ejemplo_preguntas:
      - "El CA dice 'respuesta rápida' — ¿Cuál es el tiempo máximo aceptable en ms?"
      - "¿El usuario debe estar autenticado para esta funcionalidad?"
      - "¿Qué debe ocurrir si [caso X] falla?"

  - paso: "Validación contra ADR"
    obligatorio: false
    condicion: "HU tiene ADR_Ref definido (no 'ninguno')"
    acciones:
      - "Leer sección '## Decisión' del ADR referenciado"
      - "Verificar que la HU implementa la decisión correctamente"
      - "Detectar contradicciones entre HU y ADR"
      - "SI hay contradicción → Agregar a observaciones de validación"
    checklist: ["HU alineada con decisión del ADR", "No contradice consecuencias documentadas"]

  - paso: "Validación de Criterios de Aceptación"
    obligatorio: true
    acciones:
      - "Verificar CA medibles (SMART)"
      - "Detectar ambigüedades residuales"
      - "Validar cobertura de casos de error"
      - "SI refinamiento tiene Modo=Particionada:"
      - "  - Verificar que cada CA del padre tiene traza a una Task"
      - "  - Verificar que cada Task tiene CAs granulares verificables de forma aislada"
      - "  - Verificar cadena de satisfacción: CAs granulares de TASK-N → CA-[N] del padre"
      - "SI refinamiento tiene Modo=Plano y complejidad >= MEDIO y CAs >= 6:"
      - "  - Sugerir partición: '⚠️ Esta HU tiene [N] CAs y complejidad [nivel]. Considerar partición en tasks con >refinar_hu [ID-HU].'"
      - "  - Esto es una SUGERENCIA, no un bloqueo. El veredicto puede ser APROBADA igualmente."
    checklist: ["CA específicos y verificables", "Casos de error contemplados", "Performance considerado si aplica", "Trazabilidad CA padre ↔ Tasks (si particionada)"]

  - paso: "Validación Arquitectónica"
    obligatorio: true
    nota: "Valida la HU como REQUISITO, no define implementación (eso es planificar_hu)"
    acciones:
      - "Verificar que la funcionalidad propuesta encaja en arquitectura existente"
      - "Detectar si los CA fuerzan implementaciones que violarían patrones"
      - "Evaluar si la HU introduce responsabilidades que no corresponden a su dominio"
      - "Aplicar reglas_arquitectonicas si están disponibles"
    checklist:
      - "La funcionalidad respeta la separación de responsabilidades del proyecto"
      - "Los CA no imponen decisiones técnicas que violen la arquitectura"
      - "No cruza boundaries entre módulos/capas indebidamente"
      - "Es coherente con el contexto técnico documentado"
      - "No contradice decisiones arquitectónicas previas (ADRs)"

  - paso: "Verificación de Dependencias"
    obligatorio: true
    acciones:
      - "Extraer dependencias explícitas del refinamiento y CA (APIs, HUs prerequisito, recursos)"
      - "Verificar en backlog si HUs dependientes están en estado [X] Completada"
      - "Verificar si endpoints/APIs requeridos existen (según contexto del proyecto)"
      - "SI hay dependencias no resueltas → Clasificar según tipo:"
      - "  DEPENDENCIA_HU: Requiere otra HU del backlog completada"
      - "  DEPENDENCIA_EXTERNA: Requiere sistema/API externa no disponible"
      - "  DECISION_PENDIENTE: Requiere decisión arquitectónica (ADR)"
      - "  RECURSO_NO_DISPONIBLE: Falta infraestructura o acceso"
      - "SI bloqueante → Emitir veredicto 'bloqueada' con tipo y acción requerida para desbloquear"
    comportamiento:
      sin_dependencias: "Continuar al siguiente paso"
      con_dependencias_resueltas: "Continuar al siguiente paso (documentar como nota informativa)"
      con_dependencias_no_resueltas: "Veredicto BLOQUEADA — no continuar a viabilidad ni emisión"

  - paso: "Análisis de Viabilidad Técnica"
    obligatorio: true
    acciones: ["Evaluar complejidad de implementación", "Identificar riesgos técnicos", "Validar estimación propuesta"]

  - paso: "Emisión de Veredicto"
    obligatorio: true
    acciones: ["Determinar resultado: APROBADA | AJUSTES | BLOQUEADA | RECHAZADA", "Documentar razones detalladas", "Actualizar estado según veredictos"]

  - paso: "Persistir Aprobación en Refinamiento"
    obligatorio: true
    condicion: "resultado == APROBADA"
    acciones:
      - "Abrir archivo {{artifacts.hu_refinamientos}}/[ID-HU]_refinamiento*.md"
      - "Agregar sección '## Aprobación' al final del archivo (antes de Feedback si existe)"
      - "Rellenar con:"
      - "  | Campo | Valor |"
      - "  |-------|-------|"
      - "  | **Estado** | ✅ Aprobada |"
      - "  | **Aprobado por** | Arquitecto Onad |"
      - "  | **Fecha aprobación** | [FECHA_ISO_8601] |"
      - "  | **Nivel validación** | [nivel_validacion usado] |"
      - "  | **Notas** | [Resumen de validación o 'Sin observaciones'] |"
      - ""
      - "Agregar subsección '### Directrices de Planificación' después de la tabla de aprobación:"
      - "  - **Fases sugeridas:** [Estilo arquitectónico y orden de fases recomendado según contexto]"
      - "  - **Componentes clave:** [Componentes de alto nivel a crear/modificar con ubicación sugerida]"
      - "  - **Dependencias entre HUs:** [HUs que deben completarse antes o que comparten recursos]"
      - "  - **Riesgos a mitigar:** [Riesgos técnicos detectados durante validación que impactan planificación]"
      - "  - **Notas adicionales:** [ADRs relevantes, patrones recomendados, consideraciones especiales]"
      - "SI no hay directrices relevantes para algún campo → Omitir ese campo (no usar 'N/A')"
      - "MÍNIMO: al menos un campo debe tener contenido útil; si no hay nada que aportar, usar solo campo 'Notas adicionales' con 'Sin directrices específicas'"
    nota: "Este marcador permite a >sincronizar_backlog deducir el estado [A] Aprobada desde artefactos. Las directrices son RECOMENDACIONES para >planificar_hu, no mandatos."

  - paso: "Persistir Feedback"
    obligatorio: true
    condicion: "resultado == AJUSTES"
    acciones: ["Agregar sección '## Feedback de Validación' en refinamiento", "Incluir fecha, iteración, observaciones pendientes", "Marcar como [ ] pendientes de resolver"]

  - paso: "Persistir Bloqueo"
    obligatorio: true
    condicion: "resultado == BLOQUEADA"
    acciones:
      - "Abrir archivo {{artifacts.hu_refinamientos}}/[ID-HU]_refinamiento*.md"
      - "Agregar sección '## Bloqueo de Validación' al final del archivo"
      - "Rellenar con:"
      - "  | Campo | Valor |"
      - "  |-------|-------|"
      - "  | **Estado** | 🚫 Bloqueada |"
      - "  | **Tipo bloqueo** | [DEPENDENCIA_HU|DEPENDENCIA_EXTERNA|DECISION_PENDIENTE|RECURSO_NO_DISPONIBLE] |"
      - "  | **Bloqueado por** | [Descripción: HU-XXX / endpoint / decisión / recurso] |"
      - "  | **Acción requerida** | [Qué debe ocurrir para desbloquear] |"
      - "  | **Fecha bloqueo** | [FECHA_ISO_8601] |"
      - "Actualizar estado en backlog a [B] Bloqueada con motivo"
    nota: "Permite a >sincronizar_backlog deducir el estado [B] y el motivo desde artefactos"

salida:
  archivos_actualizados: ["{{archivos.backlog}}", "{{artifacts.hu_refinamientos}}/[ID-HU]_refinamiento.md"]
  mensaje_aprobada: |
     HU APROBADA: [ID-HU]
     Validaciones:  CA |  Arquitectura |  Viabilidad
     Siguiente: >planificar_hu [ID-HU]
  mensaje_ajustes: |
     HU REQUIERE AJUSTES: [ID-HU]
     Feedback en: {{artifacts.hu_refinamientos}}/[ID-HU]_refinamiento.md
     Siguiente: >refinar_hu [ID-HU] (Refinador HU)
  mensaje_bloqueada: |
    🚫 HU BLOQUEADA: [ID-HU]
     Tipo: [TIPO_BLOQUEO]
     Motivo: [descripción de la dependencia no resuelta]
     Acción requerida: [qué debe ocurrir para desbloquear]
     Revalidar con: >validar_hu [ID-HU] (cuando se resuelva)

errores:
  hu_no_encontrada: {msg: " HU [id_hu] no encontrada", accion: "Verificar ID y ejecutar *HU para listar"}
  estado_incorrecto: {msg: " HU no está en estado [R] Refinada", accion: "Ejecutar >refinar_hu primero"}
  sin_reglas: {msg: "ℹ Sin reglas arquitectónicas", accion: "Validación basada en mejores prácticas generales"}

siguiente:
  - {comando: ">planificar_hu [ID-HU]", desc: "Si APROBADA - crear plan de implementación", chat_agente: "ArchDev Pro"}
  - {comando: ">refinar_hu [ID-HU]", desc: "Si AJUSTES - aplicar observaciones", chat_agente: "Refinador HU"}
  - {comando: ">validar_hu [ID-HU]", desc: "Si BLOQUEADA - revalidar cuando se resuelva la dependencia", chat_agente: "Arquitecto Onad"}
