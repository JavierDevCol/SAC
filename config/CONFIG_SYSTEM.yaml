# ============================================
# CONFIGURACIÓN DEL SISTEMA SAC
# ============================================
# ⚠️ NO MODIFICAR - Rutas internas del sistema
# SAC - Sistema Agéntico COCHAS
# ============================================

version: "7.2.0"

# ============================================
# CARPETAS PRINCIPALES
# ============================================
rutas:
  output_folder: "{project-root}/.SAC"
  artifacts_folder: "{project-root}/artifacts"
  config_folder: "{project-root}/.SAC/config"
  herramientas_folder: "{project-root}/.SAC/herramientas"
  agentes_folder: "{project-root}/.SAC/agentes"
  plantillas_folder: "{project-root}/.SAC/plantillas"

# ============================================
# ARCHIVOS DEL SISTEMA
# ============================================
archivos:
  config_user: "{project-root}/.SAC/config/CONFIG_USER.yaml" 
  backlog: "{artifacts_folder}/backlog_desarrollo.md"
  reglas_arquitectonicas: "{artifacts_folder}/reglas_arquitectonicas.md"
  # Workspace unificado (mono y multi proyecto)
  workspace: "{artifacts_folder}/workspace.md"

# ============================================
# SUBCARPETAS DE ARTIFACTS
# ============================================
artifacts:
  # Historias de Usuario
  hu_folder: "{artifacts_folder}/HU"
  hu_refinamientos: "{artifacts_folder}/HU/refinamientos"
  hu_compartidas: "{artifacts_folder}/HU/compartidas"
  # Arquitectura
  adr_folder: "{artifacts_folder}/ADR"
  # Planes y ejecución
  planes_folder: "{artifacts_folder}/planes_de_desarrollo"
  ejecuciones_folder: "{artifacts_folder}/ejecuciones"
  # Code quality
  code_smells_folder: "{artifacts_folder}/code_smells"
  # Multi-proyecto
  contextos_folder: "{artifacts_folder}/contextos"

# ============================================
# CONFIGURACIÓN MULTI-PROYECTO
# ============================================
multi_proyecto:
  # Patrones para detectar raíz de proyecto
  marcadores_proyecto:
    java: ["pom.xml", "build.gradle", "build.gradle.kts"]
    javascript: ["package.json"]
    python: ["pyproject.toml", "setup.py", "requirements.txt"]
    dotnet: ["*.csproj", "*.sln"]
    rust: ["Cargo.toml"]
    go: ["go.mod"]
  # Nomenclatura de archivos generados
  patron_contexto: "contexto_proyecto_{nombre}.md"
  patron_stack: "stack_proyecto_{nombre}.md"
  patron_hu_proyecto: "HU/{nombre_proyecto}/"

# ============================================
# PLANTILLAS DEL SISTEMA
# ============================================
plantillas:
  backlog: "{project-root}/.SAC/plantillas/backlog_desarrollo_plantilla.md"
  contexto: "{project-root}/.SAC/plantillas/contexto_proyecto_plantilla.md"
  workspace: "{project-root}/.SAC/plantillas/workspace_plantilla.md"
  # stack_proyecto: ELIMINADO - unificado con contexto_proyecto_plantilla.md
  plan_implementacion: "{project-root}/.SAC/plantillas/plan_implementacion_plantilla.md"
  refinamiento_hu: "{project-root}/.SAC/plantillas/refinamiento_hu_plantilla.md"
  reglas_arquitectonicas: "{project-root}/.SAC/plantillas/reglas_arquitectonicas_plantilla.md"

# ============================================
# RUTAS DE REGLAS
# ============================================
rutas_reglas:
  reglas_folder: "{project-root}/.SAC/reglas"

# ============================================
# REGLAS DEL SISTEMA
# ============================================
reglas:
  # Solo reglas con valor único (no conocimiento implícito del LLM)
  mermaid: "{project-root}/.SAC/reglas/mermaid.rules.md"
  # ELIMINADOS - conocimiento implícito del LLM:
  # - deteccion_stack, java, javascript, python, dotnet, go, patrones_diseno
