# ============================================
# CONFIGURACIÓN DEL SISTEMA SAC
# ============================================
# ⚠️ NO MODIFICAR - Rutas internas del sistema
# SAC - Sistema Agéntico COCHAS
# ============================================

version: "5.1"

# ============================================
# CARPETAS PRINCIPALES
# ============================================
rutas:
  output_folder: "{project-root}/.SAC"
  session_folder: "{project-root}/.SAC/session"
  artifacts_folder: "{project-root}/.SAC/artifacts"
  config_folder: "{project-root}/.SAC/config"

# ============================================
# ARCHIVOS DEL SISTEMA
# ============================================
archivos:
  session_state: "{project-root}/.SAC/session/session_state.json"
  config_user: "{project-root}/.SAC/config/CONFIG_USER.yaml" 
  backlog: "{project-root}/.SAC/artifacts/backlog_desarrollo.md"
  reglas_arquitectonicas: "{project-root}/.SAC/artifacts/reglas_arquitectonicas.md"
  # Proyecto único
  contexto_proyecto: "{project-root}/.SAC/artifacts/contexto_proyecto.md"
  stack_proyecto: "{project-root}/.SAC/artifacts/stack_proyecto.md"
  # Multi-proyecto
  workspace_index: "{project-root}/.SAC/artifacts/workspace.md"

# ============================================
# SUBCARPETAS DE ARTIFACTS
# ============================================
artifacts:
  # Historias de Usuario
  hu_folder: "{project-root}/.SAC/artifacts/HU"
  hu_refinamientos: "{project-root}/.SAC/artifacts/HU/refinamientos"
  hu_compartidas: "{project-root}/.SAC/artifacts/HU/compartidas"
  # Arquitectura
  adr_folder: "{project-root}/.SAC/artifacts/ADR"
  # Planes y ejecución
  planes_folder: "{project-root}/.SAC/artifacts/planes_de_desarrollo"
  ejecuciones_folder: "{project-root}/.SAC/artifacts/ejecuciones"
  # Code quality
  code_smells_folder: "{project-root}/.SAC/artifacts/code_smells"
  # Multi-proyecto
  contextos_folder: "{project-root}/.SAC/artifacts/contextos"

# ============================================
# CONFIGURACIÓN MULTI-PROYECTO
# ============================================
multi_proyecto:
  # Patrones para detectar raíz de proyecto
  marcadores_proyecto:
    java: ["pom.xml", "build.gradle", "build.gradle.kts"]
    javascript: ["package.json"]
    python: ["pyproject.toml", "setup.py", "requirements.txt"]
    dotnet: ["*.csproj", "*.sln"]
    rust: ["Cargo.toml"]
    go: ["go.mod"]
  # Nomenclatura de archivos generados
  patron_contexto: "contexto_proyecto_{nombre}.md"
  patron_hu_proyecto: "HU/{nombre_proyecto}/"

# ============================================
# PLANTILLAS DEL SISTEMA
# ============================================
plantillas:
  session_state: "plantillas/session_state_plantilla.md"
  backlog: "plantillas/backlog_desarrollo_plantilla.md"
  contexto: "plantillas/contexto_proyecto_plantilla.md"
  workspace: "plantillas/workspace_plantilla.md"
  stack_proyecto: "plantillas/stack_proyecto_plantilla.md"

# ============================================
# REGLAS DEL SISTEMA
# ============================================
reglas:
  mermaid: "{project-root}/.SAC/reglas/mermaid.rules.md"
