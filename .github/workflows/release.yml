name: Create Release on Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CONFIG_SYSTEM.yaml
        id: version
        run: |
          VERSION=$(grep -oP '^version:\s*"\K[^"]+' config/CONFIG_SYSTEM.yaml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version detected: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag v${{ steps.version.outputs.version }} already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag v${{ steps.version.outputs.version }} does not exist — will create release"
          fi

      - name: Extract changelog for this version
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between ### [X.Y.Z] and the next ### [
          NOTES=$(awk "/^### \[$VERSION\]/{found=1; next} /^### \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          # Write multiline output safely
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with assets
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "SAC ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            INSTALACION/bootstrap/install.ps1
            INSTALACION/bootstrap/install.sh
          make_latest: true
